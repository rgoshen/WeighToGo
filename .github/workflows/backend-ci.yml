name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: web/backend

jobs:
  quality:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest

  perf-postgres:
    name: NFR-P-3 index usage (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weighttogo
          POSTGRES_PASSWORD: weighttogo
          POSTGRES_DB: weighttogo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U weighttogo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: NFR-P-3 index tests
        env:
          WEIGHTTOGO_TEST_POSTGRES_DSN: postgresql+psycopg://weighttogo:weighttogo@localhost:5432/weighttogo_test
        run: uv run pytest -m postgres -v
