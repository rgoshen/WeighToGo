name: E2E

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/frontend/**'
      - 'web/backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/frontend/**'
      - 'web/backend/**'
      - '.github/workflows/e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: web/frontend

jobs:
  e2e:
    name: Playwright end-to-end tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weighttogo
          POSTGRES_PASSWORD: weighttogo
          POSTGRES_DB: weighttogo_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://weighttogo:weighttogo@localhost:5432/weighttogo_dev
      SECRET_KEY: ci-test-secret-key-at-least-32-bytes-long
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      ENVIRONMENT: development
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: web/backend
        run: uv sync

      - name: Run database migrations
        working-directory: web/backend
        run: uv run alembic upgrade head

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e -- --grep-invert "Phase 7 screenshots"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-results
          path: web/frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
