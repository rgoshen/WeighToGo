# Local PostgreSQL for Weigh to Go! backend development.
# Provisions the database only; the application itself is not containerized.
# Credentials are read from web/backend/.env (see .env.example) and fall back
# to development defaults when no .env file is present.

services:
  postgres:
    image: postgres:16
    container_name: weighttogo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weighttogo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weighttogo}
      POSTGRES_DB: ${POSTGRES_DB:-weighttogo_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weighttogo} -d ${POSTGRES_DB:-weighttogo_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
