# Pre-commit hooks for the Weigh to Go! polyglot monorepo.
#
# Mirrors the CI quality gates exactly so failures are caught locally
# before they reach GitHub Actions:
#
#   Backend  : ruff (lint + format), mypy, shellcheck, pytest
#   Frontend : eslint, prettier, tsc (type-check), vitest
#
# Activate locally once with: pre-commit install
# The frontend hooks require `npm install` to have been run in web/frontend.

repos:
  # ── Backend: lint + format (ruff) ─────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0c7b6c989466a93942def1f84baf36ddfcd60c83 # v0.15.14
    hooks:
      - id: ruff
        name: ruff (backend lint)
        args: [--fix]
        files: ^web/backend/.*\.py$
      - id: ruff-format
        name: ruff (backend format)
        files: ^web/backend/.*\.py$

  # ── Backend: type-check + tests (local, uses uv) ──────────────────────────
  - repo: local
    hooks:
      - id: backend-mypy
        name: mypy (backend type-check)
        entry: bash -c 'cd web/backend && uv run mypy'
        language: system
        files: ^web/backend/.*\.py$
        pass_filenames: false

      - id: backend-shellcheck
        name: shellcheck (backup/restore scripts)
        entry: bash -c 'cd web/backend && uv run shellcheck scripts/*.sh'
        language: system
        files: ^web/backend/scripts/.*\.sh$
        pass_filenames: false

      - id: backend-pytest
        name: pytest (backend tests)
        entry: bash -c 'cd web/backend && uv run pytest'
        language: system
        files: ^web/backend/.*\.py$
        pass_filenames: false

  # ── Frontend: lint + format + type-check + tests (local, uses npm) ────────
      - id: frontend-lint
        name: eslint (frontend lint)
        entry: "bash -c 'cd web/frontend && if [ ! -d node_modules ]; then echo frontend dependencies missing, run npm --prefix web/frontend install; exit 1; fi; npm run lint'"
        language: system
        files: ^web/frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-format
        name: prettier (frontend format check)
        entry: "bash -c 'cd web/frontend && if [ ! -d node_modules ]; then echo frontend dependencies missing, run npm --prefix web/frontend install; exit 1; fi; npm run format:check'"
        language: system
        files: ^web/frontend/.*\.(ts|tsx|js|jsx|json|css|html|md|ya?ml)$
        pass_filenames: false

      - id: frontend-typecheck
        name: tsc (frontend type-check)
        entry: "bash -c 'cd web/frontend && if [ ! -d node_modules ]; then echo frontend dependencies missing, run npm --prefix web/frontend install; exit 1; fi; npm run typecheck'"
        language: system
        files: ^web/frontend/.*\.(ts|tsx)$
        pass_filenames: false

      - id: frontend-test
        name: vitest (frontend tests)
        entry: "bash -c 'cd web/frontend && if [ ! -d node_modules ]; then echo frontend dependencies missing, run npm --prefix web/frontend install; exit 1; fi; npm run test:ci'"
        language: system
        files: ^web/frontend/.*\.(ts|tsx)$
        pass_filenames: false
